services:
  api:
    build:
      context: ./construction-delay-radar
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/model
    volumes:
      - ./data:/app/data

  streamlit:
    build:
      context: ./construction-delay-radar/frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
